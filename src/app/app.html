<!--
  Plantilla raíz de la Semana 1.
  Muestra título (signal), subtítulo con el autor y una breve descripción
  de qué es Angular. Sin lógica todavía: solo interpolación {{ }}.
-->
<main class="contenedor">
  <h1>{{ titulo() }}</h1>
  <h2>Por {{ autor() }}</h2>

  <p>
    Angular es un framework de desarrollo web de código abierto mantenido
    por Google. Permite construir aplicaciones de una sola página (SPA)
    usando TypeScript, componentes reutilizables y un sistema de
    reactividad moderno basado en <strong>Signals</strong>.
  </p>
</main>
